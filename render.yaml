services:
  - type: web
    name: math-quiz
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false          # service_role key — NOT the anon key
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false          # Paste full service account JSON string
      - key: EVENT_DURATION_SECONDS
        value: "1800"        # 30 minutes (change to override)
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_DEBUG
        value: "false"
