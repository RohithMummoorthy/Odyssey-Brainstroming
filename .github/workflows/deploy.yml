name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run smoke tests
        env:
          # Minimal env vars needed for TestingConfig — real secrets not required
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_KEY: "placeholder-key"
          JWT_SECRET: "ci-test-secret-do-not-use-in-production"
          ADMIN_PASSWORD: "ci-admin-password"
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests/ directory found — skipping"
          fi

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on direct pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s --fail \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          && echo "Deploy triggered successfully." \
          || (echo "Deploy hook failed." && exit 1)
